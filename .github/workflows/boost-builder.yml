name: Build Boost Debian Packages

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

# Centralized version management
env:
  BOOST_VERSION: "1.91.0"

permissions:
  contents: read

jobs:
  build-boost:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # arm64 targets Pi 4 & Rock64. arm/v6 (armel) targets Pi Zero W.
        platform: [linux/arm64, linux/arm/v6]
        variant_type: [release, debug]
        include:
          # Mapping to official Debian architecture tags used by apt/dpkg
          - platform: linux/arm64
            arch_name: arm64
            base_image: "ubuntu:noble"
          - platform: linux/arm/v6
            arch_name: armel
            base_image: "debian:bookworm-slim"

          # Matrix compilation strategies
          - variant_type: release
            cxxflags: "-O3"
            boost_variant: "release"
            debug_symbols: "on"
          - variant_type: debug
            cxxflags: "-O0"
            boost_variant: "debug"
            debug_symbols: "on"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Converts "1.91.0" format to "boost_1_91_0" required for the source tree
      - name: Format Directory Name
        id: format
        run: |
          DIR_NAME="boost_$(echo ${{ env.BOOST_VERSION }} | tr '.' '_')"
          echo "dir_name=$DIR_NAME" >> $GITHUB_OUTPUT

      - name: Create Build Dockerfile
        run: |
          cat << 'EOF' > Dockerfile.boost
          # Added a fallback default value ("ubuntu:noble") to clear the InvalidDefaultArgInFrom warning
          ARG BASE_IMAGE=ubuntu:noble
          FROM ${BASE_IMAGE} AS builder

          ENV DEBIAN_FRONTEND=noninteractive

          # Added checkinstall to generate the .deb package automatically
          RUN apt-get update && apt-get install -y --no-install-recommends \
              wget \
              ca-certificates \
              tar \
              build-essential \
              python3-dev \
              checkinstall \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /build

          # 2. Re-declare ARGs within the build stage scope so they are active below
          ARG BASE_IMAGE
          ARG BOOST_VERSION
          ARG BOOST_DIR
          ARG BOOST_CXXFLAGS
          ARG BOOST_VARIANT
          ARG BOOST_DEBUG_SYMBOLS
          ARG ARCH_NAME
          ARG VARIANT_TYPE

          RUN wget -nv https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_DIR}.tar.gz \
              && tar -xzf ${BOOST_DIR}.tar.gz \
              && rm ${BOOST_DIR}.tar.gz

          WORKDIR /build/${BOOST_DIR}

          # Run standard bootstrap
          RUN ./bootstrap.sh --prefix=/usr/local

          # Use checkinstall to intercept the build installation and output a .deb file
          # Fixed version formatting to use '+' instead of '-' to satisfy dpkg validation
          # Wrapped b2 flags in quotes to prevent token split failures inside checkinstall execution environment
          RUN checkinstall -y \
              --pkgname="custom-boost" \
              --pkgversion="${BOOST_VERSION}+${VARIANT_TYPE}" \
              --pkgarch="${ARCH_NAME}" \
              --pkggroup="devel" \
              --provides="custom-boost" \
              --requires="libc6" \
              --maintainer="ci-builder@local" \
              "./b2 install threading=multi link=shared,static variant=${BOOST_VARIANT} cxxflags=\"${BOOST_CXXFLAGS}\" debug-symbols=${BOOST_DEBUG_SYMBOLS}"

          # Stage 2: Discard everything else, extract ONLY the built .deb package file
          FROM scratch
          ARG BOOST_DIR
          COPY --from=builder /build/${BOOST_DIR}/*.deb /packages/
          EOF

      - name: Build Boost Package via Docker Buildx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.boost
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BOOST_VERSION=${{ env.BOOST_VERSION }}
            BOOST_DIR=${{ steps.format.outputs.dir_name }}
            BOOST_CXXFLAGS=${{ matrix.cxxflags }}
            BOOST_VARIANT=${{ matrix.boost_variant }}
            BOOST_DEBUG_SYMBOLS=${{ matrix.debug_symbols }}
            ARCH_NAME=${{ matrix.arch_name }}
            VARIANT_TYPE=${{ matrix.variant_type }}
          # Exports the raw .deb files directory out directly onto the host runner filesystem
          outputs: type=local,dest=./output-packages

      - name: Upload Debian Packages to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: boost-${{ env.BOOST_VERSION }}-${{ matrix.arch_name }}-${{ matrix.variant_type }}-deb
          path: ./output-packages/packages/*.deb
          retention-days: 5
