name: Build Boost Debian Packages

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch:

# Centralized version management
env:
  BOOST_VERSION: "1.91.0"

permissions:
  contents: read

jobs:
  smoke-test-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Format Directory Name
        id: format
        run: |
          DIR_NAME="boost_$(echo ${{ env.BOOST_VERSION }} | tr '.' '_')"
          echo "dir_name=$DIR_NAME" >> $GITHUB_OUTPUT

      - name: Create Build Dockerfile
        run: |
          cat << 'EOF' > Dockerfile.boost
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE} AS builder

          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update && apt-get install -y --no-install-recommends \
              wget \
              ca-certificates \
              tar \
              build-essential \
              python3-dev \
              checkinstall \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /build

          ARG BASE_IMAGE
          ARG BOOST_VERSION
          ARG BOOST_DIR
          ARG BOOST_CXXFLAGS
          ARG BOOST_VARIANT
          ARG BOOST_DEBUG_SYMBOLS
          ARG ARCH_NAME
          ARG VARIANT_TYPE

          RUN wget -nv https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_DIR}.tar.gz \
              && tar -xzf ${BOOST_DIR}.tar.gz \
              && rm ${BOOST_DIR}.tar.gz

          WORKDIR /build/${BOOST_DIR}

          RUN ./bootstrap.sh --prefix=/usr/local

          RUN mkdir -p /tmp/boost_staging \
              && ./b2 install \
                  --prefix=/tmp/boost_staging \
                  threading=multi \
                  link=shared,static \
                  variant=${BOOST_VARIANT} \
                  cxxflags=${BOOST_CXXFLAGS} \
                  debug-symbols=${BOOST_DEBUG_SYMBOLS}

          RUN checkinstall -y \
              --pkgname="custom-boost-${VARIANT_TYPE}" \
              --pkgversion="${BOOST_VERSION}" \
              --pkgarch="${ARCH_NAME}" \
              --pkggroup="devel" \
              --provides="custom-boost" \
              --requires="libc6" \
              --maintainer="ci-builder@local" \
              cp -a /tmp/boost_staging/. /usr/local/

          FROM scratch
          ARG BOOST_DIR
          COPY --from=builder /build/${BOOST_DIR}/*.deb /packages/
          EOF

      - name: Build Boost Package (Native AMD64 Smoke Test)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.boost
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=ubuntu:noble
            BOOST_VERSION=${{ env.BOOST_VERSION }}
            BOOST_DIR=${{ steps.format.outputs.dir_name }}
            BOOST_CXXFLAGS=-O3
            BOOST_VARIANT=release
            BOOST_DEBUG_SYMBOLS=on
            ARCH_NAME=amd64
            VARIANT_TYPE=release
          outputs: type=local,dest=./output-packages

      - name: Upload Smoke Test Artifact
        uses: actions/upload-artifact@v7
        with:
          name: boost-${{ env.BOOST_VERSION }}-amd64-smoke-release-deb
          path: ./output-packages/packages/*.deb
          retention-days: 1

  # --- MULTI-ARCH SLOW MATRIX JOB ---
  build-boost:
    needs: smoke-test-amd64 # <--- This forces the QEMU builds to wait for the smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/arm64, linux/arm/v6]
        variant_type: [release, debug]
        include:
          - platform: linux/arm64
            arch_name: arm64
            base_image: "ubuntu:noble"
          - platform: linux/arm/v6
            arch_name: armel
            base_image: "debian:bookworm-slim"
          - variant_type: release
            cxxflags: "-O3"
            boost_variant: "release"
            debug_symbols: "on"
          - variant_type: debug
            cxxflags: "-O0"
            boost_variant: "debug"
            debug_symbols: "on"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Format Directory Name
        id: format
        run: |
          DIR_NAME="boost_$(echo ${{ env.BOOST_VERSION }} | tr '.' '_')"
          echo "dir_name=$DIR_NAME" >> $GITHUB_OUTPUT

      - name: Create Build Dockerfile
        run: |
          cat << 'EOF' > Dockerfile.boost
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE} AS builder

          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update && apt-get install -y --no-install-recommends \
              wget \
              ca-certificates \
              tar \
              build-essential \
              python3-dev \
              checkinstall \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /build

          ARG BASE_IMAGE
          ARG BOOST_VERSION
          ARG BOOST_DIR
          ARG BOOST_CXXFLAGS
          ARG BOOST_VARIANT
          ARG BOOST_DEBUG_SYMBOLS
          ARG ARCH_NAME
          ARG VARIANT_TYPE

          RUN wget -nv https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_DIR}.tar.gz \
              && tar -xzf ${BOOST_DIR}.tar.gz \
              && rm ${BOOST_DIR}.tar.gz

          WORKDIR /build/${BOOST_DIR}

          RUN ./bootstrap.sh --prefix=/usr/local

          RUN mkdir -p /tmp/boost_staging \
              && ./b2 install \
                  --prefix=/tmp/boost_staging \
                  threading=multi \
                  link=shared,static \
                  variant=${BOOST_VARIANT} \
                  cxxflags=${BOOST_CXXFLAGS} \
                  debug-symbols=${BOOST_DEBUG_SYMBOLS}

          RUN checkinstall -y \
              --pkgname="custom-boost-${VARIANT_TYPE}" \
              --pkgversion="${BOOST_VERSION}" \
              --pkgarch="${ARCH_NAME}" \
              --pkggroup="devel" \
              --provides="custom-boost" \
              --requires="libc6" \
              --maintainer="ci-builder@local" \
              cp -a /tmp/boost_staging/. /usr/local/

          FROM scratch
          ARG BOOST_DIR
          COPY --from=builder /build/${BOOST_DIR}/*.deb /packages/
          EOF

      - name: Build Boost Package via Docker Buildx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.boost
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BOOST_VERSION=${{ env.BOOST_VERSION }}
            BOOST_DIR=${{ steps.format.outputs.dir_name }}
            BOOST_CXXFLAGS=${{ matrix.cxxflags }}
            BOOST_VARIANT=${{ matrix.boost_variant }}
            BOOST_DEBUG_SYMBOLS=${{ matrix.debug_symbols }}
            ARCH_NAME=${{ matrix.arch_name }}
            VARIANT_TYPE=${{ matrix.variant_type }}
          outputs: type=local,dest=./output-packages

      - name: Upload Debian Packages to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: boost-${{ env.BOOST_VERSION }}-${{ matrix.arch_name }}-${{ matrix.variant_type }}-deb
          path: ./output-packages/packages/*.deb
          retention-days: 5
