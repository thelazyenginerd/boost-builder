name: Build Multi-Arch Boost Libraries

permissions:
  contents: read
  actions: write

on:
  push:
    branches:
      - "main"
      - "dev"
  workflow_dispatch:

# Centralized version management
env:
  BOOST_VERSION: "1.91.0"

jobs:
  build-boost:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v8
        variant_type:
          - release
          - debug
        include:
          # Architecture label translations
          - platform: linux/amd64
            arch_name: amd64
          #- platform: linux/arm/v6
          #  arch_name: armv6
          #- platform: linux/arm/v8
          #  arch_name: armv8
          # Matrix compilation strategies
          - variant_type: release
            cxxflags: "-O3"
            boost_variant: "release"
            debug_symbols: "on"
          - variant_type: debug
            cxxflags: "-O0"
            boost_variant: "debug"
            debug_symbols: "on"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Converts "1.91.0" format to "boost_1_91_0" required for the source tree
      - name: Format Directory Name
        id: format
        run: |
          DIR_NAME="boost_$(echo ${{ env.BOOST_VERSION }} | tr '.' '_')"
          echo "dir_name=$DIR_NAME" >> $GITHUB_OUTPUT

      - name: Create Build Dockerfile
        run: |
          cat << 'EOF' > Dockerfile.boost
          # Stage 1: Build inside a Debian environment to generate glibc-compatible binaries
          FROM ubuntu:noble AS builder

          # Install dependencies using apt-get instead of apk
          RUN apt-get update && apt-get install -y --no-install-recommends \
              wget \
              ca-certificates \
              tar \
              build-essential \
              linux-headers-generic \
              python3-dev \
              && rm -rf /var/lib/apt/lists/*

          ARG BOOST_VERSION
          ARG BOOST_DIR
          ARG BOOST_CXXFLAGS
          ARG BOOST_VARIANT
          ARG BOOST_DEBUG_SYMBOLS

          WORKDIR /build
          RUN wget -nv https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_DIR}.tar.gz \
              && tar -xzf ${BOOST_DIR}.tar.gz \
              && rm ${BOOST_DIR}.tar.gz

          WORKDIR /build/${BOOST_DIR}
          RUN ./bootstrap.sh --prefix=/opt/boost \
              && ./b2 install --prefix=/opt/boost \
                  threading=multi \
                  link=shared,static \
                  variant=${BOOST_VARIANT} \
                  cxxflags=${BOOST_CXXFLAGS} \
                  debug-symbols=${BOOST_DEBUG_SYMBOLS}

          # Stage 2: Discard build tools, export only the debian/ubuntu binaries
          FROM scratch
          COPY --from=builder /opt/boost /boost
          EOF

      - name: Build Boost via Docker Buildx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.boost
          platforms: ${{ matrix.platform }}
          build-args: |
            BOOST_VERSION=${{ env.BOOST_VERSION }}
            BOOST_DIR=${{ steps.format.outputs.dir_name }}
            BOOST_CXXFLAGS=${{ matrix.cxxflags }}
            BOOST_VARIANT=${{ matrix.boost_variant }}
            BOOST_DEBUG_SYMBOLS=${{ matrix.debug_symbols }}
          outputs: type=tar,dest=./boost-${{ env.BOOST_VERSION }}-${{ matrix.arch_name }}-${{ matrix.variant_type }}.tar

      - name: Upload Boost Artifacts to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: boost-${{ env.BOOST_VERSION }}-${{ matrix.arch_name }}-${{ matrix.variant_type }}
          path: ./boost-${{ env.BOOST_VERSION }}-${{ matrix.arch_name }}-${{ matrix.variant_type }}.tar
          retention-days: 1
